<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTCORE Admin — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff4747;
    --success: #4caf50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .badge-admin {
    background: var(--accent2);
    color: #000;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .logout-btn {
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    transition: opacity 0.15s;
  }

  .logout-btn:hover { opacity: 0.9; }

  /* CONTAINER */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.85rem;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(232,255,71,0.3);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding-bottom: 0.5rem;
    transition: color 0.15s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1rem;
    padding-bottom: 1.5rem;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
  }

  .form-full {
    grid-column: 1 / -1;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
  }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.7rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    grid-column: 1 / -1;
  }

  .btn-submit {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-submit:hover { opacity: 0.9; }

  .btn-cancel {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-cancel:hover { border-color: var(--accent); }

  /* PRODUCTS TABLE */
  .products-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .products-table thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .products-table th {
    padding: 1rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .products-table td {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .products-table tr:last-child td {
    border-bottom: none;
  }

  .product-name {
    font-weight: 600;
    color: var(--accent);
  }

  .product-badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.25rem 0.6rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .product-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn-edit {
    background: var(--accent2);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-size: 0.8rem;
    transition: opacity 0.15s;
  }

  .btn-edit:hover { opacity: 0.9; }

  .btn-delete {
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-size: 0.8rem;
    transition: opacity 0.15s;
  }

  .btn-delete:hover { opacity: 0.9; }

  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--muted);
  }

  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    padding: 1rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    z-index: 300;
    animation: slideUp 0.3s ease;
  }

  .toast.success {
    border-left-color: var(--success);
  }

  .toast.error {
    border-left-color: var(--danger);
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* LOGIN */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem;
    max-width: 400px;
    width: 100%;
  }

  .login-box h2 {
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.5rem;
    font-size: 1.5rem;
  }

  .login-box p {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }

    .products-table {
      font-size: 0.8rem;
    }

    .products-table th, .products-table td {
      padding: 0.75rem;
    }

    .product-actions {
      flex-direction: column;
    }
  }
</style>
</head>
<body id="app">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h2>VOLT<span style="color: var(--accent);">CORE</span> Admin</h2>
    <p>Manage your PC parts inventory</p>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-submit" style="width: 100%; margin-top: 0.5rem;">LOGIN</button>
    </form>
    <p style="color: var(--muted); font-size: 0.8rem; margin-top: 1.5rem;">Demo: username: <strong>admin</strong> | password: <strong>admin123</strong></p>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminScreen" class="hidden">
  <!-- NAV -->
  <nav>
    <div class="logo">VOLT<span>CORE</span> <span class="badge-admin">ADMIN</span></div>
    <div class="nav-right">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container">
    <div class="header">
      <h1>Product Management</h1>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add')">➕ Add New Product</button>
      <button class="tab-btn" onclick="switchTab('manage')">📦 Manage Products</button>
    </div>

    <!-- TAB: ADD PRODUCT -->
    <div id="addTab" class="tab-content active">
      <div class="form-grid">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="productName" placeholder="e.g., Ryzen 9 7950X" required>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="productCategory" required>
            <option value="">Select Category</option>
            <option value="CPU">CPU</option>
            <option value="GPU">GPU</option>
            <option value="RAM">RAM</option>
            <option value="Storage">Storage</option>
            <option value="Motherboard">Motherboard</option>
            <option value="Cooling">Cooling</option>
            <option value="PSU">PSU</option>
            <option value="Case">Case</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Brand *</label>
          <input type="text" id="productBrand" placeholder="e.g., AMD, Intel, NVIDIA" required>
        </div>
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" id="productPrice" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label>Old Price (optional)</label>
          <input type="number" id="productOldPrice" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Icon/Emoji *</label>
          <input type="text" id="productIcon" placeholder="e.g., ⚙️" maxlength="2" required>
        </div>
        <div class="form-group form-full">
          <label>Specifications *</label>
          <textarea id="productSpec" placeholder="e.g., 16 cores / 32 threads / 5.7GHz" required></textarea>
        </div>
        <div class="form-group">
          <label>Badge (optional)</label>
          <select id="productBadge">
            <option value="">No Badge</option>
            <option value="NEW">NEW</option>
            <option value="HOT">HOT</option>
            <option value="SALE">SALE</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rating (Stars 1-5)</label>
          <input type="number" id="productStars" min="1" max="5" value="4">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="resetForm()">Clear</button>
          <button type="button" class="btn-submit" onclick="addProduct()">Add Product</button>
        </div>
      </div>
    </div>

    <!-- TAB: MANAGE PRODUCTS -->
    <div id="manageTab" class="tab-content">
      <div id="productsContainer"></div>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast" style="display: none;"></div>

<script>
// Demo credentials: admin / admin123
const DEMO_USERNAME = 'admin';
const DEMO_PASSWORD = 'admin123';
const STORAGE_KEY = 'voltcore_products';

let isLoggedIn = false;
let products = [];

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  loadProducts();
  const saved = localStorage.getItem('voltcore_admin_logged_in');
  if (saved) {
    isLoggedIn = true;
    showAdminScreen();
  }
});

function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  if (username === DEMO_USERNAME && password === DEMO_PASSWORD) {
    isLoggedIn = true;
    localStorage.setItem('voltcore_admin_logged_in', 'true');
    showAdminScreen();
    showToast('✓ Logged in successfully!', 'success');
  } else {
    showToast('✗ Invalid credentials!', 'error');
  }
}

function logout() {
  if (confirm('Are you sure you want to logout?')) {
    isLoggedIn = false;
    localStorage.removeItem('voltcore_admin_logged_in');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminScreen').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showToast('✓ Logged out!', 'success');
  }
}

function showAdminScreen() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('adminScreen').classList.remove('hidden');
  loadProductsTable();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  event.target.classList.add('active');
  if (tab === 'add') {
    document.getElementById('addTab').classList.add('active');
  } else {
    document.getElementById('manageTab').classList.add('active');
    loadProductsTable();
  }
}

function addProduct() {
  const name = document.getElementById('productName').value.trim();
  const category = document.getElementById('productCategory').value;
  const brand = document.getElementById('productBrand').value.trim();
  const price = parseFloat(document.getElementById('productPrice').value);
  const oldPrice = document.getElementById('productOldPrice').value ? parseFloat(document.getElementById('productOldPrice').value) : null;
  const icon = document.getElementById('productIcon').value.trim();
  const spec = document.getElementById('productSpec').value.trim();
  const badge = document.getElementById('productBadge').value || null;
  const stars = parseInt(document.getElementById('productStars').value) || 4;

  if (!name || !category || !brand || !price || !icon || !spec) {
    showToast('✗ Please fill in all required fields!', 'error');
    return;
  }

  const newProduct = {
    id: Math.max(0, ...products.map(p => p.id)) + 1,
    name,
    category,
    brand,
    price,
    oldPrice,
    icon,
    spec,
    badge,
    stars
  };

  products.push(newProduct);
  saveProducts();
  resetForm();
  showToast(`✓ "${name}" added successfully!`, 'success');
}

function deleteProduct(id) {
  const product = products.find(p => p.id === id);
  if (confirm(`Delete "${product.name}"?`)) {
    products = products.filter(p => p.id !== id);
    saveProducts();
    loadProductsTable();
    showToast(`✓ Product deleted!`, 'success');
  }
}

function editProduct(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;

  document.getElementById('productName').value = product.name;
  document.getElementById('productCategory').value = product.category;
  document.getElementById('productBrand').value = product.brand;
  document.getElementById('productPrice').value = product.price;
  document.getElementById('productOldPrice').value = product.oldPrice || '';
  document.getElementById('productIcon').value = product.icon;
  document.getElementById('productSpec').value = product.spec;
  document.getElementById('productBadge').value = product.badge || '';
  document.getElementById('productStars').value = product.stars;

  // Change button to update
  const submitBtn = document.querySelector('.btn-submit');
  submitBtn.textContent = 'Update Product';
  submitBtn.onclick = () => updateProduct(id);

  // Switch to add tab
  document.querySelectorAll('.tab-btn')[0].click();

  // Scroll to form
  document.querySelector('.form-grid').scrollIntoView({ behavior: 'smooth' });
}

function updateProduct(id) {
  const name = document.getElementById('productName').value.trim();
  const category = document.getElementById('productCategory').value;
  const brand = document.getElementById('productBrand').value.trim();
  const price = parseFloat(document.getElementById('productPrice').value);
  const oldPrice = document.getElementById('productOldPrice').value ? parseFloat(document.getElementById('productOldPrice').value) : null;
  const icon = document.getElementById('productIcon').value.trim();
  const spec = document.getElementById('productSpec').value.trim();
  const badge = document.getElementById('productBadge').value || null;
  const stars = parseInt(document.getElementById('productStars').value) || 4;

  if (!name || !category || !brand || !price || !icon || !spec) {
    showToast('✗ Please fill in all required fields!', 'error');
    return;
  }

  const product = products.find(p => p.id === id);
  if (product) {
    product.name = name;
    product.category = category;
    product.brand = brand;
    product.price = price;
    product.oldPrice = oldPrice;
    product.icon = icon;
    product.spec = spec;
    product.badge = badge;
    product.stars = stars;

    saveProducts();
    resetForm();
    loadProductsTable();
    showToast(`✓ "${name}" updated successfully!`, 'success');
  }
}

function resetForm() {
  document.getElementById('productName').value = '';
  document.getElementById('productCategory').value = '';
  document.getElementById('productBrand').value = '';
  document.getElementById('productPrice').value = '';
  document.getElementById('productOldPrice').value = '';
  document.getElementById('productIcon').value = '';
  document.getElementById('productSpec').value = '';
  document.getElementById('productBadge').value = '';
  document.getElementById('productStars').value = '4';

  const submitBtn = document.querySelector('.btn-submit');
  submitBtn.textContent = 'Add Product';
  submitBtn.onclick = () => addProduct();
}

function loadProductsTable() {
  const container = document.getElementById('productsContainer');

  if (products.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <h3>No products yet</h3>
        <p>Add your first product to get started!</p>
      </div>`;
    return;
  }

  let html = `
    <table class="products-table">
      <thead>
        <tr>
          <th>Product Name</th>
          <th>Category</th>
          <th>Brand</th>
          <th>Price</th>
          <th>Rating</th>
          <th>Badge</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>`;

  products.forEach(p => {
    const badgeHtml = p.badge ? `<span class="product-badge">${p.badge}</span>` : '<span class="product-badge" style="background: transparent; border: none; color: var(--muted);">—</span>';
    const stars = '★'.repeat(p.stars) + '☆'.repeat(5 - p.stars);
    html += `
      <tr>
        <td class="product-name">${p.icon} ${p.name}</td>
        <td>${p.category}</td>
        <td>${p.brand}</td>
        <td>$${p.price}</td>
        <td><span style="color: #f0a500;">${stars}</span></td>
        <td>${badgeHtml}</td>
        <td>
          <div class="product-actions">
            <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
            <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
          </div>
        </td>
      </tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
}

function saveProducts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

function loadProducts() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    products = JSON.parse(saved);
  } else {
    // Load default products from main shop
    products = [
      { id:1, name:"Ryzen 9 7950X", category:"CPU", brand:"AMD", price:699, oldPrice:799, spec:"16 cores / 32 threads / 5.7GHz", icon:"⚙️", badge:"HOT", stars:5 },
      { id:2, name:"Core i9-14900K", category:"CPU", brand:"Intel", price:549, oldPrice:null, spec:"24 cores / 32 threads / 6.0GHz", icon:"⚙️", badge:"NEW", stars:5 },
      { id:3, name:"Ryzen 5 7600X", category:"CPU", brand:"AMD", price:249, oldPrice:299, spec:"6 cores / 12 threads / 5.3GHz", icon:"⚙️", badge:null, stars:4 },
      { id:4, name:"RTX 4090", category:"GPU", brand:"NVIDIA", price:1599, oldPrice:1799, spec:"24GB GDDR6X / 16384 CUDA cores", icon:"🎮", badge:"HOT", stars:5 },
      { id:5, name:"RX 7900 XTX", category:"GPU", brand:"AMD", price:999, oldPrice:null, spec:"24GB GDDR6 / 96 compute units", icon:"🎮", badge:"NEW", stars:5 },
      { id:6, name:"RTX 4070 Super", category:"GPU", brand:"NVIDIA", price:599, oldPrice:649, spec:"12GB GDDR6X / 7168 CUDA cores", icon:"🎮", badge:null, stars:4 },
      { id:7, name:"Vengeance DDR5 32GB", category:"RAM", brand:"Corsair", price:129, oldPrice:159, spec:"DDR5-6000 / CL30 / 2×16GB", icon:"💾", badge:"SALE", stars:4 },
      { id:8, name:"Trident Z5 RGB 64GB", category:"RAM", brand:"G.Skill", price:219, oldPrice:null, spec:"DDR5-6400 / CL32 / 2×32GB", icon:"💾", badge:"NEW", stars:5 },
    ];
    saveProducts();
  }
}

function showToast(message, type = 'default') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.style.display = 'block';
  
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}
</script>
</body>
</html>
